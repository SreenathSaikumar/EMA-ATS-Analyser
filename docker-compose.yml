services:
  api:
    build: .
    container_name: ats-analyser-api
    ports:
      - "8001:8001"
    environment:
      SERVICE: api
      PYTHON_DOTENV_DISABLED: 1
      MYSQL_DB_HOST: ats-analyser-mysql
      MYSQL_DB_PORT: 3306
      MYSQL_DB_DATABASE: ats_analyser
      MYSQL_DB_USER: root
      MYSQL_DB_PASS: root
      MYSQL_DB_POOL_SIZE: 5
      MYSQL_DB_MAX_OVERFLOW: 10

      # Required by src/config/env_vars.py
      OPENAI_API_KEY: "dummy"
      OPENAI_API_BASE: "https://api.openai.com/v1"
      OPENAI_API_VERSION: "v1"
      OPENAI_API_MODEL: "gpt-4o-mini"
      OPENAI_API_MODEL_VERSION: "latest"

      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_REGION: elasticmq
      SQS_ENDPOINT_URL: http://ats-analyser-elasticmq:9324
      SQS_QUEUE_NAME: ats-processor-queue
    depends_on:
      - mysql
      - elasticmq
    networks:
      - ats-net

  consumer:
    build: .
    container_name: ats-analyser-consumer
    environment:
      SERVICE: consumer
      PYTHON_DOTENV_DISABLED: 1
      MYSQL_DB_HOST: ats-analyser-mysql
      MYSQL_DB_PORT: 3306
      MYSQL_DB_DATABASE: ats_analyser
      MYSQL_DB_USER: root
      MYSQL_DB_PASS: root
      MYSQL_DB_POOL_SIZE: 5
      MYSQL_DB_MAX_OVERFLOW: 10

      # Required by src/config/env_vars.py at import time (provide placeholders for local dev).
      OPENAI_API_KEY: "dummy"
      OPENAI_API_BASE: "https://api.openai.com/v1"
      OPENAI_API_VERSION: "v1"
      OPENAI_API_MODEL: "gpt-4o-mini"
      OPENAI_API_MODEL_VERSION: "latest"

      # SQS (for localstack; only needed if/when your code starts using SQS).
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_REGION: elasticmq
      SQS_ENDPOINT_URL: http://ats-analyser-elasticmq:9324
      SQS_QUEUE_NAME: ats-processor-queue
    depends_on:
      - elasticmq
    networks:
      - ats-net

  mysql:
    image: mysql:8.0.45
    container_name: ats-analyser-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ats_analyser
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ats-net

  elasticmq:
    image: softwaremill/elasticmq:1.6.16
    container_name: ats-analyser-elasticmq
    ports:
      - "9324:9324"
      - "9325:9325"
    networks:
      - ats-net

volumes:
  mysql_data:


networks:
  ats-net:
    driver: bridge
